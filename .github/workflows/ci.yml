name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'profile/**'
      - '.github/profile/**'

permissions:
  contents: read

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]  # supported LTS only (24 Active, 22 Maintenance); 18/20 are EOL — bump as the Node LTS schedule moves
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      # Zero-dependency: no install step. Run the same fail-loud gate as the local hooks,
      # cross-platform — verify (incl. the plugin/ dist-sync check) then the test suite.
      - run: node scripts/verify.mjs
      - run: node scripts/test.mjs
