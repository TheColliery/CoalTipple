name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    name: gate (${{ matrix.os }} · node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      # Zero-dependency: no install step. Run the same fail-loud gate as the local hooks,
      # cross-platform — verify (incl. the plugin/ dist-sync check) then the test suite.
      - run: node scripts/verify.mjs
      - run: node scripts/test.mjs
